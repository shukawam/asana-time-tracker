name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Node 20.x ships with npm 10, but OIDC trusted publishing only
      # authenticates correctly from npm 11.5.1+. Without this upgrade,
      # provenance signs OK but the registry PUT fails with a misleading
      # 404. Pin to npm@11 to track patches within the supported major.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11

      - name: Derive version + dist-tag from release tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a semver version (expected like 'v1.2.3' or 'v1.2.3-rc.1')"
            exit 1
          fi
          # Stable versions land on `latest`; prereleases (e.g. v1.2.3-rc.0)
          # go to `next` so `npm install` keeps resolving to the stable line.
          # npm 11+ requires --tag to be explicit for prereleases.
          dist_tag="latest"
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Pin package version to release tag
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag "${{ steps.version.outputs.dist_tag }}"
