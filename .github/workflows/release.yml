name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Derive version from release tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a semver version (expected like 'v1.2.3' or 'v1.2.3-rc.1')"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Pin package version to release tag
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
